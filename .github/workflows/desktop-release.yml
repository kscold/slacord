name: desktop-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            command: yarn release:desktop:mac
          - os: windows-2022
            command: yarn release:desktop:win
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Validate desktop release version
        run: |
          VERSION=$(node -p "require('./packages/desktop/package.json').version")
          echo "desktop version=$VERSION"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            [[ "$VERSION" == "$TAG_VERSION" ]] || {
              echo "tag version ($TAG_VERSION) does not match desktop version ($VERSION)"
              exit 1
            }
          fi

      - name: Publish desktop artifacts
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK && 'true' || 'false' }}
        run: |
          # 코드 서명 시크릿이 있을 때만 env에 주입 (빈 문자열은 electron-builder 오류 유발)
          if [[ -n "${{ secrets.CSC_LINK }}" ]]; then
            export CSC_LINK="${{ secrets.CSC_LINK }}"
            export CSC_KEY_PASSWORD="${{ secrets.CSC_KEY_PASSWORD }}"
          fi
          if [[ -n "${{ secrets.APPLE_ID }}" ]]; then
            export APPLE_ID="${{ secrets.APPLE_ID }}"
            export APPLE_APP_SPECIFIC_PASSWORD="${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
          fi
          if [[ -n "${{ secrets.WIN_CSC_LINK }}" ]]; then
            export WIN_CSC_LINK="${{ secrets.WIN_CSC_LINK }}"
            export WIN_CSC_KEY_PASSWORD="${{ secrets.WIN_CSC_KEY_PASSWORD }}"
          fi
          ${{ matrix.command }}
