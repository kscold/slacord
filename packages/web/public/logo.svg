<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Rounded square base -->
  <rect x="2" y="2" width="36" height="36" rx="10" fill="#1a1410"/>
  <rect x="2" y="2" width="36" height="36" rx="10" stroke="#b97532" stroke-width="1.5"/>

  <!-- Chat bubble top-left -->
  <rect x="8" y="9" width="16" height="10" rx="5" fill="#b97532"/>
  <circle cx="13" cy="14" r="1.2" fill="#1a1410"/>
  <circle cx="16" cy="14" r="1.2" fill="#1a1410"/>
  <circle cx="19" cy="14" r="1.2" fill="#1a1410"/>

  <!-- Chat bubble bottom-right -->
  <rect x="16" y="21" width="16" height="10" rx="5" fill="#d6b08a"/>
  <rect x="20" y="25" width="8" height="1.5" rx="0.75" fill="#1a1410"/>

  <!-- Connection line -->
  <line x1="20" y1="19" x2="20" y2="21" stroke="#b97532" stroke-width="1.2" stroke-linecap="round"/>
</svg>
